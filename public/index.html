<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Managed Agents POC</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --input-bg:  #0d1117;
      --accent:    #2f81f7;
      --accent-hover: #2672de;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --border:    #30363d;
      --danger:    #f85149;
      --weather:   #f0883e;
      --research:  #a371f7;
      --user-bg:   #238636;
      --radius:    12px;
      --font:      -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica,
                   Arial, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
                   monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ── Header ───────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header .logo {
      width: 30px;
      height: 30px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), var(--research));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #fff;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    header .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
      font-family: var(--font-mono);
      background: var(--bg);
      padding: 2px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    /* ── Chat Area ────────────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Welcome State ────────────────────────────────── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      gap: 10px;
      padding: 40px 20px;
    }

    .welcome h2 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .welcome p {
      color: var(--muted);
      font-size: 14px;
      max-width: 420px;
      line-height: 1.6;
    }

    /* ── Message Bubbles ──────────────────────────────── */
    .msg {
      max-width: 80%;
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; }
    .msg.agent { align-self: flex-start; }

    .msg .bubble {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.agent .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg.agent.error .bubble {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(248, 81, 73, 0.06);
    }

    /* ── Agent Routing Badge ──────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 999px;
      width: fit-content;
      color: var(--accent);
      background: rgba(47, 129, 247, 0.1);
      border: 1px solid rgba(47, 129, 247, 0.25);
    }

    .badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--accent);
    }

    .badge.weather {
      color: var(--weather);
      background: rgba(240, 136, 62, 0.1);
      border-color: rgba(240, 136, 62, 0.25);
    }
    .badge.weather .dot { background: var(--weather); }

    .badge.research {
      color: var(--research);
      background: rgba(163, 113, 247, 0.1);
      border-color: rgba(163, 113, 247, 0.25);
    }
    .badge.research .dot { background: var(--research); }

    /* ── Loading Animation ────────────────────────────── */
    .loading .bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
    }

    .loading .bubble .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .loading .bubble .dot:nth-child(2) { animation-delay: 0.15s; }
    .loading .bubble .dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%           { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Sample Prompt Chips ──────────────────────────── */
    #samples {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      overflow-x: auto;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    #samples::-webkit-scrollbar { height: 4px; }
    #samples::-webkit-scrollbar-track { background: transparent; }
    #samples::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #samples .label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding-right: 4px;
    }

    #samples button {
      flex-shrink: 0;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    #samples button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    #samples button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── Composer ──────────────────────────────────────── */
    #composer {
      display: flex;
      gap: 8px;
      padding: 12px 20px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #prompt {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font);
      outline: none;
      transition: border-color 0.15s;
    }

    #prompt::placeholder { color: var(--muted); }
    #prompt:focus { border-color: var(--accent); }
    #prompt:disabled { opacity: 0.5; cursor: not-allowed; }

    #send {
      flex-shrink: 0;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    #send:hover { background: var(--accent-hover); }
    #send:active { transform: scale(0.97); }
    #send:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      #chat { padding: 14px 16px; }
      #samples { padding: 8px 16px; }
      #composer { padding: 10px 16px 14px; }
      .msg { max-width: 90%; }
      header .subtitle { display: none; }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">M</div>
    <h1>Managed Agents POC</h1>
    <span class="subtitle">Claude-to-Claude delegation</span>
  </header>

  <!-- Chat Messages Area -->
  <main id="chat" aria-live="polite">
    <div class="welcome" id="welcome">
      <h2>Multi-Agent Chat</h2>
      <p>Ask about the weather or any research question. The orchestrator classifies your prompt and routes it to the right sub-agent automatically.</p>
    </div>
  </main>

  <!-- Sample Prompt Buttons (mirrors src/data/prompts.ts SAMPLE_USER_PROMPTS) -->
  <div id="samples">
    <span class="label">Try:</span>
    <button type="button" data-prompt="What's the weather in San Francisco right now?">Weather in SF</button>
    <button type="button" data-prompt="What's the weather in Paris in Celsius?">Weather in Paris</button>
    <button type="button" data-prompt="Explain how managed agents work in one paragraph.">Explain managed agents</button>
    <button type="button" data-prompt="Summarize the difference between tool-use and orchestration in LLM agents.">Tool-use vs orchestration</button>
  </div>

  <!-- Composer -->
  <form id="composer" autocomplete="off">
    <label for="prompt" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">
      Your message
    </label>
    <input id="prompt" type="text" autocomplete="off" placeholder="Ask the agent about weather or anything else..." />
    <button id="send" type="submit">Send</button>
  </form>

  <script>
    /* ── DOM References ─────────────────────────────── */
    var chat      = document.getElementById("chat");
    var welcomeEl = document.getElementById("welcome");
    var form      = document.getElementById("composer");
    var input     = document.getElementById("prompt");
    var sendBtn   = document.getElementById("send");
    var samplesEl = document.getElementById("samples");

    /* ── Helpers ────────────────────────────────────── */

    /** Map agentType to display label. */
    function agentLabel(agentType) {
      if (agentType === "weather") return "weather-agent";
      if (agentType === "research") return "research-agent";
      return "other-agent";
    }

    /** Remove welcome card on first message. */
    function dismissWelcome() {
      if (welcomeEl && welcomeEl.parentNode) {
        welcomeEl.remove();
        welcomeEl = null;
      }
    }

    /**
     * Append a message bubble to the chat.
     * @param {"user"|"agent"} role
     * @param {string} text
     * @param {string} [agentType] - "weather", "research", or "other"
     * @param {boolean} [isError]
     * @returns {HTMLElement} the created message element
     */
    function appendMessage(role, text, agentType, isError) {
      dismissWelcome();

      var msg = document.createElement("div");
      msg.className = "msg " + role;
      if (isError) msg.classList.add("error");

      // Agent routing badge (for non-error assistant messages)
      if (role === "agent" && agentType && !isError) {
        var badge = document.createElement("span");
        badge.className = "badge " + (agentType === "weather" || agentType === "research" ? agentType : "");

        var dot = document.createElement("span");
        dot.className = "dot";
        badge.appendChild(dot);

        badge.appendChild(document.createTextNode(" " + agentLabel(agentType)));
        msg.appendChild(badge);
      }

      var bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;  // textContent only — never innerHTML (XSS guard)
      msg.appendChild(bubble);

      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      return msg;
    }

    /** Show animated loading dots as a pending assistant message. */
    function showLoading() {
      dismissWelcome();

      var msg = document.createElement("div");
      msg.className = "msg agent loading";
      msg.id = "pending";

      var bubble = document.createElement("div");
      bubble.className = "bubble";
      for (var i = 0; i < 3; i++) {
        var dot = document.createElement("span");
        dot.className = "dot";
        bubble.appendChild(dot);
      }
      msg.appendChild(bubble);

      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      return msg;
    }

    /** Remove the loading indicator. */
    function clearLoading() {
      var el = document.getElementById("pending");
      if (el) el.remove();
    }

    /** Lock/unlock interactive elements during a request. */
    function setLocked(locked) {
      input.disabled = locked;
      sendBtn.disabled = locked;
      samplesEl.querySelectorAll("button").forEach(function(btn) {
        btn.disabled = locked;
      });
      if (!locked) input.focus();
    }

    /* ── Submit Logic ───────────────────────────────── */

    async function submitPrompt(prompt) {
      prompt = (prompt || "").trim();
      if (!prompt) return;

      // Show user bubble
      appendMessage("user", prompt);
      input.value = "";
      setLocked(true);
      showLoading();

      try {
        var resp = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt: prompt }),
        });

        var data = await resp.json();
        clearLoading();

        if (!resp.ok) {
          appendMessage("agent", "Error: " + (data.error || resp.statusText), null, true);
        } else {
          appendMessage("agent", data.response, data.agentType);
        }
      } catch (err) {
        clearLoading();
        appendMessage("agent", "Network error: " + String(err.message || err), null, true);
      } finally {
        setLocked(false);
      }
    }

    /* ── Event Listeners ────────────────────────────── */

    // Form submit
    form.addEventListener("submit", function(e) {
      e.preventDefault();
      submitPrompt(input.value);
    });

    // Sample prompt chips — event delegation on parent
    samplesEl.addEventListener("click", function(e) {
      var btn = e.target.closest("button[data-prompt]");
      if (!btn || input.disabled) return;
      submitPrompt(btn.dataset.prompt);
    });

    // Auto-focus input on load
    input.focus();
  </script>
</body>
</html>
